<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SemoView Daily</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0c11;--s:rgba(255,255,255,.05);--sh:rgba(255,255,255,.09);
  --b:rgba(255,255,255,.1);--gold:#c9a96e;--gs:rgba(201,169,110,.18);
  --gb:rgba(201,169,110,.35);--text:#ffffff;--dim:rgba(255,255,255,.5);
  --mid:rgba(255,255,255,.75);--r:10px;
  --green:#5fcf85;--red:#e05555;--blue:#5b9bd5;--orange:#e8923a;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;font-size:15px;display:flex;flex-direction:column}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--b);background:rgba(12,12,17,.97);flex-shrink:0;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:50}
.brand{display:flex;flex-direction:column;gap:1px}
.brand-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:#fff}
.brand-name em{color:var(--gold);font-style:normal}
.brand-link{font-size:12px;color:var(--gold);text-decoration:none;opacity:.75;transition:opacity .16s}
.brand-link:hover{opacity:1;text-decoration:underline}
.hright{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.hdate{font-size:13px;color:var(--mid)}
.htabs{display:flex;gap:2px;background:rgba(255,255,255,.04);border:1px solid var(--b);border-radius:8px;padding:3px}
.htab{padding:5px 13px;border-radius:5px;font-size:13px;color:var(--dim);cursor:pointer;transition:all .16s;border:none;background:none;font-family:'DM Sans',sans-serif;font-weight:600}
.htab.on{background:var(--gs);border:1px solid var(--gb);color:var(--gold)}
.hbtn{background:var(--s);border:1px solid var(--b);border-radius:7px;padding:6px 12px;color:var(--mid);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .18s;white-space:nowrap}
.hbtn:hover{border-color:var(--gb);color:var(--gold)}

/* WORKSPACE */
.workspace{display:grid;grid-template-columns:1fr 270px;flex:1;height:calc(100vh - 56px);overflow:hidden}
.col{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--b)}
.col:last-child{border-right:none}
.col-head{padding:14px 17px 12px;border-bottom:1px solid var(--b);flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between}
.ctitle{font-family:'Playfair Display',serif;font-size:14px;color:var(--gold);letter-spacing:.8px;text-transform:uppercase}
.csub{font-size:13px;color:var(--dim);margin-top:3px}
.col-body{flex:1;overflow-y:auto;padding:14px}

/* QUICK BAR */
.qbar{padding:10px 15px;border-bottom:1px solid var(--b);background:rgba(255,255,255,.02);flex-shrink:0}
.qrow{display:flex;gap:7px}
.qinput{flex:1;background:var(--s);border:1px solid var(--b);border-radius:8px;padding:9px 13px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .18s}
.qinput:focus{border-color:var(--gb)}.qinput::placeholder{color:var(--dim)}
.qadd{background:var(--gold);border:none;border-radius:8px;padding:9px 15px;color:#0c0c11;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;transition:background .18s}
.qadd:hover{background:#d9ba82}
.qhint{font-size:12px;color:var(--dim);margin-top:5px}

/* BRIEFING */
.bcard{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;animation:up .3s ease}
.bcard.alert{border-color:rgba(224,85,85,.4);background:rgba(224,85,85,.05)}
.bcardtitle{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:11px;font-weight:700;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.brow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);line-height:1.55}
.brow:last-child{border-bottom:none;padding-bottom:0}
.brow-left{flex:1;min-width:0}
.bname{font-size:15px;font-weight:700;color:#fff;margin-bottom:3px}
.bsub{font-size:13px;color:var(--dim)}
.bval{font-size:15px;font-weight:700;color:#fff;text-align:right;flex-shrink:0}
.btags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:9px;font-size:11px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.tag.g{background:rgba(95,207,133,.15);color:var(--green);border:1px solid rgba(95,207,133,.3)}
.tag.r{background:rgba(224,85,85,.15);color:var(--red);border:1px solid rgba(224,85,85,.3)}
.tag.o{background:rgba(232,146,58,.15);color:var(--orange);border:1px solid rgba(232,146,58,.3)}
.tag.gold{background:var(--gs);color:var(--gold);border:1px solid var(--gb)}
.tag.b{background:rgba(91,155,213,.12);color:var(--blue);border:1px solid rgba(91,155,213,.25)}

/* EVENTS */
.day-group{margin-bottom:14px}
.dlabel{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);margin-bottom:8px;display:flex;align-items:center;gap:7px;font-weight:700}
.dlabel.tdy{color:var(--gold)}
.dline{flex:1;height:1px;background:var(--b)}
.ecard{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:11px 13px 11px 17px;margin-bottom:7px;position:relative;cursor:pointer;transition:all .18s;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;animation:up .3s ease both}
.ecard::before{content:'';position:absolute;left:0;top:10px;bottom:10px;width:2px;background:var(--gold);border-radius:0 2px 2px 0;opacity:.7}
.ecard:hover{background:var(--sh);border-color:var(--gb)}
.etime{font-size:12px;color:var(--gold);font-weight:700;letter-spacing:.4px;margin-bottom:4px}
.etitle{font-size:15px;font-weight:600;color:#fff;line-height:1.4}
.emeta{font-size:12px;color:var(--dim);margin-top:3px}
.edel{opacity:0;background:none;border:none;color:var(--dim);font-size:13px;cursor:pointer;flex-shrink:0;padding:2px 4px;border-radius:4px;transition:all .16s;line-height:1}
.ecard:hover .edel{opacity:.55}.edel:hover{opacity:1!important;color:var(--red)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);padding:16px}
.overlay.show{display:flex}
.modal{width:100%;max-width:390px;background:#13131a;border:1px solid var(--b);border-radius:14px;padding:24px 22px;animation:up .28s ease}
.mtitle{font-family:'Playfair Display',serif;font-size:16px;color:var(--gold);margin-bottom:18px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;letter-spacing:.9px;text-transform:uppercase;color:var(--dim);margin-bottom:6px;font-weight:700}
.field input{width:100%;background:var(--s);border:1px solid var(--b);border-radius:7px;padding:10px 12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .16s}
.field input:focus{border-color:var(--gb)}
.mrow2{display:flex;gap:8px}.mrow2 .field{flex:1}
.mbtns{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
.mbtn{border:none;border-radius:7px;padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all .16s}
.mbtn.cancel{background:var(--s);border:1px solid var(--b);color:var(--mid)}.mbtn.cancel:hover{border-color:var(--gb)}
.mbtn.save{background:var(--gold);color:#0c0c11;font-weight:700}.mbtn.save:hover{background:#d9ba82}

/* TODO */
.tadd-row{display:flex;gap:6px;margin-bottom:7px}
.tinput{flex:1;background:var(--s);border:1px solid var(--b);border-radius:7px;padding:9px 12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .16s}
.tinput:focus{border-color:var(--gb)}.tinput::placeholder{color:var(--dim)}
.taddbtn{width:34px;height:34px;background:var(--gs);border:1px solid var(--gb);border-radius:7px;cursor:pointer;color:var(--gold);font-size:19px;display:flex;align-items:center;justify-content:center;transition:background .16s;flex-shrink:0}
.taddbtn:hover{background:rgba(201,169,110,.28)}
.psel{width:100%;background:var(--s);border:1px solid var(--b);border-radius:7px;padding:7px 10px;color:var(--mid);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;margin-bottom:13px}
.psel option{background:#13131a}
.glabel{font-size:11px;letter-spacing:1.3px;text-transform:uppercase;color:var(--dim);margin-bottom:7px;font-weight:700;padding-left:2px;margin-top:13px}
.glabel:first-child{margin-top:0}
.titem{display:flex;align-items:flex-start;gap:9px;padding:10px 11px;background:var(--s);border:1px solid var(--b);border-radius:7px;margin-bottom:6px;transition:all .16s;animation:up .25s ease both}
.titem:hover{border-color:rgba(255,255,255,.14)}
.cb{width:17px;height:17px;border:1.5px solid rgba(255,255,255,.25);border-radius:4px;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .16s}
.cb.done{background:var(--gold);border-color:var(--gold)}
.cb.done::after{content:'✓';color:#0c0c11;font-size:11px;font-weight:800}
.tlabel{font-size:14px;color:#fff;line-height:1.5;flex:1;font-weight:500}
.tlabel.done{text-decoration:line-through;color:var(--dim);font-weight:400}
.ptag{font-size:11px;padding:2px 7px;border-radius:9px;font-weight:700;flex-shrink:0;margin-top:2px}
.ptag.high{background:rgba(224,85,85,.18);color:#ff8080;border:1px solid rgba(224,85,85,.3)}
.ptag.mid{background:var(--gs);color:var(--gold);border:1px solid var(--gb)}
.ptag.low{background:rgba(91,155,213,.12);color:#7aafd4;border:1px solid rgba(91,155,213,.25)}
.delbtn{background:none;border:none;cursor:pointer;color:var(--dim);font-size:13px;opacity:0;transition:opacity .16s;padding:0;line-height:1;flex-shrink:0}
.titem:hover .delbtn{opacity:.55}.delbtn:hover{opacity:1!important}

/* STATUS BAR */
.status-bar{font-size:12.5px;padding:6px 15px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--b);color:var(--dim);display:flex;gap:14px;flex-wrap:wrap;flex-shrink:0}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
.dot-ok{background:var(--green)}
.dot-err{background:var(--red)}
.dot-wait{background:var(--orange);animation:pulse 1.2s ease infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* MISC */
.empty{text-align:center;color:var(--dim);font-size:14px;padding:28px 0;font-style:italic;line-height:2}
.loading{display:flex;flex-direction:column;align-items:center;gap:10px;padding:32px 0}
.spin{width:19px;height:19px;border:2px solid var(--b);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
.spin-t{font-size:13px;color:var(--dim)}
.advice-box{background:linear-gradient(135deg,rgba(201,169,110,.08),rgba(201,169,110,.03));border:1px solid var(--gb);border-radius:var(--r);padding:13px 15px;margin-bottom:12px}
.advice-title{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:7px;font-weight:700}
.advice-text{font-size:14px;color:var(--mid);line-height:1.8}
.goal-row{display:flex;align-items:center;gap:7px;margin-left:auto}
.goal-row label{font-size:12px;color:var(--dim)}
.goal-sel{background:var(--s);border:1px solid var(--b);border-radius:5px;padding:3px 8px;color:var(--mid);font-family:'DM Sans',sans-serif;font-size:12px;outline:none}
.goal-sel option{background:#13131a}
.warn-box{background:rgba(224,85,85,.08);border:1px solid rgba(224,85,85,.25);border-radius:7px;padding:9px 13px;font-size:13px;color:#ff9999;line-height:1.7;margin-top:8px}
.retry-btn{background:var(--gs);border:1px solid var(--gb);border-radius:6px;padding:5px 11px;color:var(--gold);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:7px;transition:background .16s}
.retry-btn:hover{background:rgba(201,169,110,.28)}

/* MOBILE */
.mob-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(12,12,17,.97);border-top:1px solid var(--b);z-index:50;grid-template-columns:repeat(4,1fr)}
@media(max-width:750px){
  .mob-bar{display:grid}
  .workspace{grid-template-columns:1fr;height:auto;overflow:visible}
  .todo-col{display:none}
  .todo-col.mob-show{display:flex}
  body{padding-bottom:62px}
  .col{height:auto;overflow:visible}
  .col-body{overflow:visible;max-height:none}
}
.mobtab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;color:var(--dim);cursor:pointer;padding:7px 4px;transition:color .16s;border:none;background:none;font-family:'DM Sans',sans-serif}
.mobtab.on{color:var(--gold)}
.mobtab .i{font-size:19px}

@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(201,169,110,.3)}
</style>
</head>
<body>

<!-- MODAL -->
<div class="overlay" id="evModal">
  <div class="modal">
    <div class="mtitle" id="mtitle">일정 추가</div>
    <div class="field"><label>제목 *</label><input id="mTitle" placeholder="예: 팀 회의"></div>
    <div class="mrow2">
      <div class="field"><label>날짜</label><input id="mDate" type="date"></div>

    <div class="field"><label>장소 / 메모</label><input id="mLoc" placeholder="선택 사항"></div>

      <button class="mbtn save" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<header class="hdr">
  <div class="brand">
    <div class="brand-name">Semo<em>View</em> Daily</div>
    <a class="brand-link" href="https://blog.naver.com/skycreation" target="_blank">blog.naver.com/skycreation ↗</a>
  </div>
  <div class="hright">

      <button class="htab on" onclick="setV('brief',this)">브리핑</button>

<!-- STATUS BAR -->
<div class="status-bar" id="statusBar">
  <span><span class="status-dot dot-wait" id="dotYT"></span>유튜브</span>
  <span><span class="status-dot dot-wait" id="dotCL"></span>클라이언트</span>
  <span><span class="status-dot dot-wait" id="dotTL"></span>타임라인</span>
</div>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- MAIN -->
  <div class="col">
    <div class="qbar" id="qbar" style="display:none">
      <div class="qrow">
        <input class="qinput" id="qinput" placeholder='"내일 오전 10시 팀 회의" 또는 "3/28 14:00 클라이언트 미팅"' onkeydown="if(event.key==='Enter')quickAdd()">
        <button class="qadd" onclick="quickAdd()">추가</button>
      </div>
      <div class="qhint">예: 오늘 3시 보고서 검토 · 내일 오전 10시-12시 회의 · 3/28 14:00 미팅 강남역</div>
    </div>
    <div class="col-head">
      <div><div class="ctitle" id="mainTitle">브리핑</div><div class="csub" id="mainSub">오늘 현황 요약</div></div>
    </div>
    <div class="col-body" id="mainBody">
      <div class="loading"><div class="spin"></div><div class="spin-t">데이터 불러오는 중…</div></div>

  <!-- TODO -->
  <div class="col todo-col" id="todoCol">

      <div><div class="ctitle">할 일 & 우선순위</div><div class="csub" id="todoSub">오늘 집중할 업무</div></div>
    </div>
    <div class="col-body">
      <div class="tadd-row">
        <input class="tinput" id="tinput" placeholder="할 일 입력…" onkeydown="if(event.key==='Enter')addTodo()">
        <button class="taddbtn" onclick="addTodo()">+</button>

      <select class="psel" id="psel">
        <option value="high">🔴 높음 — 오늘 반드시</option>
        <option value="mid" selected>🟡 보통 — 오늘 안에</option>
        <option value="low">🔵 낮음 — 여유 있을 때</option>
      </select>
      <div id="todoList"></div>
    </div>
  </div>
</div>

<!-- MOBILE -->
<div class="mob-bar">
  <button class="mobtab on" onclick="mobV('brief',this)"><span class="i">📋</span>브리핑</button>
  <button class="mobtab" onclick="mobV('today',this)"><span class="i">📅</span>오늘</button>
  <button class="mobtab" onclick="mobV('week',this)"><span class="i">🗓</span>이번주</button>
  <button class="mobtab" onclick="mobV('todo',this)"><span class="i">✅</span>할일</button>
</div>

<script>
// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════
const SH_CLIENTS = { id:'1Np9f7hRRZq-WtBkw-KTGeiLFnvFZlWX602O4REZ638I', gid:'2114109509' };
const SH_TIMELINE = { id:'14t8MTgpyjap_gyys8K6cuRJEuc0dIZLIhY2UZHnJoJs', gid:'0' };
const YT_RSS = 'https://www.youtube.com/feeds/videos.xml?channel_id=UCEftmElUZRmdDk_WFlWUiiQ';

// 여러 프록시 - 하나 실패하면 다음으로 자동 전환
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`
];

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let curV='brief', editId=null;
let events=[], todos=[];
let ytData=null, clients=[], timeline=[];
let ytGoal=parseInt(localStorage.getItem('ytGoal')||'7');

try{events=JSON.parse(localStorage.getItem('sv-events')||'[]')}catch(_){}
try{todos=JSON.parse(localStorage.getItem('sv-todos')||'[]')}catch(_){}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
(function(){
  tick(); setInterval(tick,30000);
  renderTodos();
  doRefresh();
})();

function tick(){
  const d=new Date();
  document.getElementById('hdate').textContent=
    d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'})+
    ' '+d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}

// ══════════════════════════════════════════
//  PROXY FETCH - 여러 프록시 자동 재시도
// ══════════════════════════════════════════
async function proxyFetch(url, timeoutMs=12000){
  for(let i=0; i<PROXIES.length; i++){
    const proxyUrl = PROXIES[i](url);
    try{
      const ctrl = new AbortController();
      const timer = setTimeout(()=>ctrl.abort(), timeoutMs);
      const res = await fetch(proxyUrl, {signal: ctrl.signal});
      clearTimeout(timer);
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      if(text && text.length > 10) return text;
      throw new Error('Empty response');
    } catch(e){
      console.warn(`Proxy ${i+1} failed:`, e.message);
      if(i === PROXIES.length-1) throw new Error('All proxies failed');
    }
  }
}

function csvParse(txt){
  const rows=[];
  for(const line of txt.replace(/\r/g,'').split('\n')){
    if(!line.trim())continue;
    const fields=[]; let f='',q=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"')q=!q;
      else if(line[i]===','&&!q){fields.push(f.trim());f='';}
      else f+=line[i];
    }
    fields.push(f.trim());
    rows.push(fields);
  }
  return rows;
}

function setDot(id, state){ // 'ok' | 'err' | 'wait'
  const el=document.getElementById(id);
  if(!el)return;
  el.className='status-dot '+(state==='ok'?'dot-ok':state==='err'?'dot-err':'dot-wait');
}

async function doRefresh(){
  const btn=document.getElementById('refreshBtn');
  btn.textContent='↻ 로딩중…';
  btn.disabled=true;
  setDot('dotYT','wait'); setDot('dotCL','wait'); setDot('dotTL','wait');
  document.getElementById('mainBody').innerHTML='<div class="loading"><div class="spin"></div><div class="spin-t">데이터 불러오는 중…</div></div>';
  await Promise.allSettled([loadYT(), loadClients(), loadTimeline()]);
  btn.textContent='↻ 새로고침';
  btn.disabled=false;
  render();
}

async function loadYT(){
  try{
    const xml = await proxyFetch(YT_RSS, 10000);
    const doc = new DOMParser().parseFromString(xml,'text/xml');
    const entry = doc.querySelector('entry');
    if(!entry) throw new Error('No entry');
    const pub = entry.querySelector('published')?.textContent;
    const title = entry.querySelector('title')?.textContent;
    const link = entry.querySelector('link')?.getAttribute('href');
    if(pub){ ytData={pub:new Date(pub),title,link}; setDot('dotYT','ok'); }
    else throw new Error('No published date');
  }catch(e){
    console.warn('YT fail',e);
    ytData=null;
    setDot('dotYT','err');
  }
}

async function loadClients(){
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SH_CLIENTS.id}/export?format=csv&gid=${SH_CLIENTS.gid}`;
    const csv = await proxyFetch(url, 15000);
    const rows = csvParse(csv);
    clients=[];
    for(let i=2;i<rows.length;i++){
      const r=rows[i];
      if(!r[0]||!r[4]||!r[4].trim())continue;
      clients.push({
        no:r[0], contractDate:r[1], status:r[3], name:r[4],
        period:r[5], monthlyPosts:r[6], paidMonths:parseInt(r[7])||0,
        published:r[8], lastPost:r[9],
        monthlyFee:r[15], totalPaid:r[16], remaining:r[17], bigo:r[18]||''
      });
    }
    setDot('dotCL','ok');
  }catch(e){
    console.warn('clients fail',e);
    setDot('dotCL','err');
  }
}

async function loadTimeline(){
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SH_TIMELINE.id}/export?format=csv&gid=${SH_TIMELINE.gid}`;
    const csv = await proxyFetch(url, 15000);
    const rows = csvParse(csv);
    timeline=[];
    for(let i=1;i<rows.length;i++){
      const r=rows[i];
      if(!r[1]||!r[1].trim())continue;
      const d=parseKorDate(r[1]);
      if(!d||isNaN(d))continue;
      timeline.push({
        date:d, name:r[2], cat:r[3], status:r[4],
        round:r[5], amount:r[6], content:r[7], blogUrl:r[8]||''
      });
    }
    setDot('dotTL','ok');
  }catch(e){
    console.warn('timeline fail',e);
    setDot('dotTL','err');
  }
}

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function todayISO(){return new Date().toISOString().slice(0,10);}
function todayD(){const d=new Date();d.setHours(0,0,0,0);return d;}
function daysDiff(a,b){return Math.round((a-b)/86400000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){return d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});}
function fmtMoney(s){const n=parseInt((s||'').replace(/[^\d]/g,''));return n&&!isNaN(n)?n.toLocaleString()+'원':'-';}

function parseKorDate(s){
  const m=s.match(/(\d{4})년\s*(\d{1,2})\s*(\d{1,2})일/);
  return m?new Date(+m[1],+m[2]-1,+m[3]):null;
}

function nextPayDate(bigo){
  const t=todayD();
  if(/매달\s*말/.test(bigo)){
    let d=new Date(t.getFullYear(),t.getMonth()+1,0);
    if(d<t)d=new Date(t.getFullYear(),t.getMonth()+2,0);
    return d;
  }
  const m=bigo.match(/매달\s*(\d+)일/);
  if(m){
    const day=+m[1];
    let d=new Date(t.getFullYear(),t.getMonth(),day);
    if(d<=t)d=new Date(t.getFullYear(),t.getMonth()+1,day);
    return d;
  }
  return null;
}

function render(){
  const body=document.getElementById('mainBody');
  const title=document.getElementById('mainTitle');
  const sub=document.getElementById('mainSub');
  if(curV==='brief'){
    title.textContent='브리핑'; sub.textContent='오늘 현황 요약';
    renderBrief(body);
  } else if(curV==='today'){
    const list=events.filter(e=>e.date===todayISO());
    title.textContent='오늘의 일정'; sub.textContent=`총 ${list.length}건`;
    renderEvList(body,list,false);
  } else {
    const {mon,sun}=wkRange();
    const list=events.filter(e=>e.date>=mon&&e.date<=sun);
    title.textContent='이번주 일정'; sub.textContent=`총 ${list.length}건`;
    renderEvList(body,list,true);
  }
}

function wkRange(){
  const d=new Date(),day=d.getDay();
  const mon=new Date(d); mon.setDate(d.getDate()-(day===0?6:day-1));
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  return {mon:mon.toISOString().slice(0,10),sun:sun.toISOString().slice(0,10)};
}

  const today=todayD(); let html='';

  // ── 1. 이번주 일정

  if(!weekEvs.length){html+=`<div class="brow"><div class="bsub">이번 주 등록된 일정이 없습니다.</div></div>`;}

    const G={};

      const isT=d===todayISO();
      const lbl=new Date(d+'T12:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
      G[d].forEach(ev=>{
        const t=ev.start?(ev.end?`${ev.start}–${ev.end}`:ev.start):'종일';

          <div class="brow-left">
            <div class="bname" style="${isT?'color:var(--gold)':''}">${isT?'오늘':lbl} · ${t}</div>
            <div class="bsub">${esc(ev.title)}${ev.loc?' · 📍'+esc(ev.loc):''}</div>
          </div>
        </div>`;
      });
    });
  }
  html+=`</div>`;

  // ── 2. 오늘 일정
  const todayEvs=events.filter(e=>e.date===todayISO()).sort((a,b)=>(a.start||'99').localeCompare(b.start||'99'));
  html+=`<div class="bcard"><div class="bcardtitle">📅 오늘 일정 <span class="tag gold">${todayEvs.length}건</span></div>`;
  if(!todayEvs.length){html+=`<div class="brow"><div class="bsub">등록된 일정이 없습니다.</div></div>`;}
  else todayEvs.forEach(ev=>{
    const t=ev.start?(ev.end?`${ev.start}–${ev.end}`:ev.start):'종일';

  });
  html+=`</div>`;

  // ── 3. 할일
  const ac=todos.filter(t=>!t.done), hi=ac.filter(t=>t.p==='high');
  html+=`<div class="bcard"><div class="bcardtitle">✅ 할 일 <span class="tag ${hi.length?'r':'gold'}">${ac.length}건 미완</span></div>`;
  if(!todos.length){html+=`<div class="brow"><div class="bsub">할 일이 없습니다.</div></div>`;}
  else{
    const ord=['high','mid','low'];
    [...ac].sort((a,b)=>ord.indexOf(a.p)-ord.indexOf(b.p)).slice(0,4).forEach(t=>{
      const lc={high:'r',mid:'gold',low:'b'}[t.p];
      const ll={high:'🔴 높음',mid:'🟡 보통',low:'🔵 낮음'}[t.p];
      html+=`<div class="brow"><div class="brow-left"><div class="bname">${esc(t.text)}</div></div><span class="tag ${lc}">${ll}</span></div>`;
    });
    if(ac.length>4) html+=`<div style="font-size:11px;color:var(--dim);text-align:center;padding-top:6px">+${ac.length-4}건 더 있음</div>`;
  }
  html+=`</div>`;

  // ── 4. 오늘의 조언
  const h=new Date().getHours();
  const advice=h<10?'오전 집중 타임입니다. 중요한 업무부터 처리하세요.':h<13?'오전 마무리 타임입니다. 오후 일정을 미리 확인해보세요.':h<15?'점심 후 시간입니다. 이메일·가벼운 업무에 적합합니다.':h<18?'오후 마무리 중입니다. 내일 할 일을 미리 정리해보세요.':'하루 마무리 시간입니다. 완료한 항목을 체크해보세요.';
  html+=`<div class="advice-box"><div class="advice-title">💡 오늘의 조언</div><div class="advice-text">${advice}</div></div>`;

    <div class="goal-row"><label>업로드 목표</label>
      <select class="goal-sel" onchange="setGoal(this.value)">
        ${[[3,'3일'],[7,'주 1회'],[14,'2주 1회'],[30,'월 1회']].map(([v,l])=>`<option value="${v}"${ytGoal===+v?' selected':''}>${l}</option>`).join('')}

      </div>
    </div>`;
    if(over) html+=`<div class="warn-box">목표 주기(${ytGoal}일)를 <strong>${days-ytGoal}일</strong> 초과했습니다. 새 영상 업로드를 검토해보세요.</div>`;
  } else {
    html+=dataErrBlock('유튜브');
  }
  html+=`</div>`;

  // ── 6. 콘텐츠 발행
  const tPending=timeline.filter(t=>t.status==='발행전');

  const tUpcoming=tPending.filter(t=>daysDiff(t.date,today)>=-1&&daysDiff(t.date,today)<=14);
  const tPayDue=timeline.filter(t=>t.cat==='결제'&&t.status==='입금전'&&daysDiff(t.date,today)>=-5&&daysDiff(t.date,today)<=14);

  html+=`<div class="bcard ${tOverdue.length?'alert':''}"><div class="bcardtitle">📝 콘텐츠 발행 현황`;
  if(tOverdue.length) html+=` <span class="tag r">미발행 ${tOverdue.length}건</span>`;
  html+=`</div>`;
  if(!timeline.length){
    html+=dataErrBlock('타임라인 시트');
  } else {
    tOverdue.slice(0,2).forEach(t=>{
      const d=Math.abs(daysDiff(t.date,today));

      html+=`<div class="brow">
        <div class="brow-left"><div class="bname">${lbl} · ${esc(t.round)}</div><div class="bsub">${esc(t.content||'내용 미정')} · ${esc(t.name)}</div></div>
        <div class="bval" style="font-size:11px;color:${d<=1?'var(--orange)':'var(--mid)'}">${fmtDate(t.date)}</div>
      </div>`;
    });
    if(!tOverdue.length&&!tUpcoming.length) html+=`<div class="brow"><div class="bsub">2주 내 예정 발행이 없습니다.</div></div>`;
    if(tPayDue.length){
      html+=`<div style="height:1px;background:var(--b);margin:6px 0"></div>`;
      tPayDue.forEach(t=>{
        const d=daysDiff(t.date,today), ov=d<0;
        html+=`<div class="brow">
          <div class="brow-left"><div class="bname" style="color:${ov?'var(--red)':'var(--gold)'}">💰 ${ov?`입금 지연 D+${Math.abs(d)}일`:`입금 예정 D-${d}일`} · ${esc(t.round)}</div><div class="bsub">${esc(t.name)}</div></div>
          <div class="bval" style="color:${ov?'var(--red)':'var(--gold)'};font-size:11px">${fmtDate(t.date)}</div>
        </div>`;

  // ── 7. 클라이언트
  const active=clients.filter(c=>c.status==='진행중');
  html+=`<div class="bcard"><div class="bcardtitle">💼 클라이언트 현황 <span class="tag gold">${active.length}명 진행중</span></div>`;

    html+=dataErrBlock('클라이언트 시트');
  } else {
    clients.forEach(c=>{
      const pay=nextPayDate(c.bigo);
      const dd=pay?daysDiff(pay,today):null;
      const overdue=dd!==null&&dd<0;
      const urgent=dd!==null&&dd>=0&&dd<=3;
      let payTag='';
      if(dd!==null){
        if(overdue) payTag=`<span class="tag r">💸 연체 D+${Math.abs(dd)}일</span>`;
        else if(urgent) payTag=`<span class="tag o">💰 결제 D-${dd}일</span>`;
        else payTag=`<span class="tag b">결제 D-${dd}일</span>`;
      }
      html+=`<div class="brow" style="${overdue?'border-left:2px solid var(--red);padding-left:10px;margin-left:-2px':''}">
        <div class="brow-left">

          <div class="bsub">${c.monthlyPosts} · 발행 ${c.published} · 마지막 ${c.lastPost}</div>
          <div class="btags">${payTag}${pay?`<span class="tag b" style="opacity:.65">${fmtDate(pay)}</span>`:''}</div>
        </div>
        <div style="text-align:right;min-width:78px">
          <div class="bval" style="font-size:12px;color:${overdue?'var(--red)':'var(--mid)'}">${fmtMoney(c.remaining)}</div>
          <div class="bsub">잔여</div>
        </div>
      </div>`;
    });
  }
  html+=`</div>`;

  body.innerHTML=html;
}

function renderEvList(body,list,group){

function evCard(ev,i){
  const t=ev.start?(ev.end?`${ev.start}–${ev.end}`:ev.start):'종일';

function quickAdd(){

function parseNat(orig){
  let txt=orig,date=todayISO(),start='',end='',title=orig,loc='';
  const td=new Date();
  if(/내일/.test(txt)){const d=new Date(td);d.setDate(d.getDate()+1);date=d.toISOString().slice(0,10);txt=txt.replace(/내일/,'').trim();}
  else if(/모레/.test(txt)){const d=new Date(td);d.setDate(d.getDate()+2);date=d.toISOString().slice(0,10);txt=txt.replace(/모레/,'').trim();}
  else if(/오늘/.test(txt)){txt=txt.replace(/오늘/,'').trim();}
  else{const m=txt.match(/(\d{1,2})[\/월](\d{1,2})일?/);if(m){date=`${td.getFullYear()}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;txt=txt.replace(m[0],'').trim();}}
  const tr=txt.match(/(\d{1,2})(?::(\d{2}))?시?[-~](\d{1,2})(?::(\d{2}))?시?/);
  if(tr){start=`${tr[1].padStart(2,'0')}:${tr[2]||'00'}`;end=`${tr[3].padStart(2,'0')}:${tr[4]||'00'}`;txt=txt.replace(tr[0],'').trim();}
  else{
    const ap=txt.match(/(오전|오후)\s*(\d{1,2})(?::(\d{2}))?시?/);
    const hm=txt.match(/(\d{1,2}):(\d{2})/);
    const ho=txt.match(/(\d{1,2})시/);
    if(ap){let h=+ap[2];if(ap[1]==='오후'&&h<12)h+=12;if(ap[1]==='오전'&&h===12)h=0;start=`${String(h).padStart(2,'0')}:${ap[3]||'00'}`;txt=txt.replace(ap[0],'').trim();}
    else if(hm){start=`${hm[1].padStart(2,'0')}:${hm[2]}`;txt=txt.replace(hm[0],'').trim();}
    else if(ho){start=`${ho[1].padStart(2,'0')}:00`;txt=txt.replace(ho[0],'').trim();}
  }
  const lm=txt.match(/\s+([\S]+역|[\S]+실|[\S]+센터|zoom|teams|meet|온라인)$/i);
  if(lm){loc=lm[1];txt=txt.replace(lm[0],'').trim();}
  title=txt.replace(/\s+/g,' ').trim()||'새 일정';
  return {id:Date.now()+Math.random(),title,date,start,end,loc,note:''};
}

function openModal(id){
  editId=id||null;
  const ev=id?events.find(e=>e.id===id):null;
  document.getElementById('mtitle').textContent=ev?'일정 수정':'일정 추가';
  document.getElementById('mTitle').value=ev?ev.title:'';
  document.getElementById('mDate').value=ev?ev.date:todayISO();
  document.getElementById('mStart').value=ev?ev.start:'';
  document.getElementById('mEnd').value=ev?ev.end:'';
  document.getElementById('mLoc').value=ev?(ev.loc||''):'';
  document.getElementById('evModal').classList.add('show');
}
function closeModal(){document.getElementById('evModal').classList.remove('show');}
function saveEvent(){
  const title=document.getElementById('mTitle').value.trim();
  if(!title){alert('제목을 입력해주세요.');return;}
  const ev={id:editId||Date.now(),title,date:document.getElementById('mDate').value||todayISO(),start:document.getElementById('mStart').value,end:document.getElementById('mEnd').value,loc:document.getElementById('mLoc').value.trim(),note:''};
  if(editId)events=events.map(e=>e.id===editId?ev:e);else events.push(ev);
  saveEvs();render();closeModal();
}
function delEv(id,e){e.stopPropagation();if(!confirm('삭제하시겠습니까?'))return;events=events.filter(x=>x.id!==id);saveEvs();render();}
function saveEvs(){try{localStorage.setItem('sv-events',JSON.stringify(events));}catch(_){}}

// ══════════════════════════════════════════
//  TODOS
// ══════════════════════════════════════════
function addTodo(){
  const el=document.getElementById('tinput'),t=el.value.trim();if(!t)return;
  todos.unshift({id:Date.now(),text:t,p:document.getElementById('psel').value,done:false});
  saveTodos();renderTodos();el.value='';
}
function toggleTodo(id){const t=todos.find(x=>x.id===id);if(t){t.done=!t.done;saveTodos();renderTodos();}}
function delTodo(id){todos=todos.filter(x=>x.id!==id);saveTodos();renderTodos();}
function saveTodos(){try{localStorage.setItem('sv-todos',JSON.stringify(todos));}catch(_){}}

function renderTodos(){
  const list=document.getElementById('todoList');
  const sub=document.getElementById('todoSub');
  const ac=todos.filter(t=>!t.done),dn=todos.filter(t=>t.done);
  sub.textContent=`미완 ${ac.length}건 · 완료 ${dn.length}건`;
  if(!todos.length){list.innerHTML=`<div class="empty">할 일을 추가해보세요.</div>`;return;}
  const ord=['high','mid','low'];
  const sorted=[...ac].sort((a,b)=>ord.indexOf(a.p)-ord.indexOf(b.p));
  let html='';
  if(sorted.length)html+=`<div class="glabel">진행 중 · ${sorted.length}</div>`+sorted.map(tItem).join('');
  if(dn.length)html+=`<div class="glabel">완료 · ${dn.length}</div>`+dn.map(tItem).join('');
  list.innerHTML=html;
}
function tItem(t){
  const lbl={high:'높음',mid:'보통',low:'낮음'};
  return `<div class="titem"><div class="cb ${t.done?'done':''}" onclick="toggleTodo(${t.id})"></div><div class="tlabel ${t.done?'done':''}">${esc(t.text)}</div>${!t.done?`<span class="ptag ${t.p}">${lbl[t.p]}</span>`:''}<button class="delbtn" onclick="delTodo(${t.id})">✕</button></div>`;
}

// overlay 외부 클릭
document.getElementById('evModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
</script>
